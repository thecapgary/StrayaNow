<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StrayaNow — Australian Spatial Intelligence</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/satellite.js@5.0.0/dist/satellite.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #05070d; font-family: 'Courier New', monospace; }
    #cesiumContainer { position: absolute; inset: 0; }
    .cesium-widget-credits { display: none !important; }

    /* ── Header ── */
    #header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10; height: 44px;
      background: rgba(5,7,13,0.90); border-bottom: 1px solid rgba(249,168,37,0.25);
      display: flex; align-items: center; padding: 0 12px; gap: 16px;
      backdrop-filter: blur(8px);
    }
    #header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.12em; color: #f9a825; white-space: nowrap; }
    #header h1 span { color: #fff; }
    .tagline { font-size: 9px; color: #444; letter-spacing: 0.15em; text-transform: uppercase; }
    .mode-buttons { display: flex; gap: 3px; margin-left: auto; }
    .mode-btn {
      font-family: 'Courier New', monospace; font-size: 10px; font-weight: 700;
      padding: 3px 8px; border: 1px solid rgba(255,255,255,0.15);
      background: transparent; color: #555; cursor: pointer; letter-spacing: 0.08em;
      border-radius: 2px; transition: all 0.15s;
    }
    .mode-btn:hover { color: #ccc; }
    #mode-indicator { font-size: 10px; color: #f9a825; letter-spacing: 0.12em; min-width: 46px; }

    /* ── Left panel ── */
    #left-panel {
      position: absolute; top: 52px; left: 12px; z-index: 10; width: 196px;
      background: rgba(5,7,13,0.88); border: 1px solid rgba(249,168,37,0.18);
      border-radius: 4px; backdrop-filter: blur(8px); max-height: calc(100vh - 120px); overflow-y: auto;
    }
    .panel-title {
      padding: 6px 12px; font-size: 9px; font-weight: 700; letter-spacing: 0.18em;
      color: #f9a825; text-transform: uppercase; border-bottom: 1px solid rgba(249,168,37,0.12);
      background: rgba(249,168,37,0.04); position: sticky; top: 0; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
    }
    #btn-settings {
      background: none; border: none; color: #555; font-size: 13px; cursor: pointer;
      padding: 0 2px; line-height: 1; transition: color 0.15s;
    }
    #btn-settings:hover { color: #f9a825; }

    /* ── Landmarks editor modal ── */
    #landmarks-modal {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      align-items: flex-start; justify-content: flex-start;
      padding: 60px 0 0 12px;
    }
    #landmarks-panel {
      width: 540px; max-height: calc(100vh - 80px);
      background: rgba(5,7,13,0.97); border: 1px solid rgba(249,168,37,0.3);
      border-radius: 6px; display: flex; flex-direction: column; overflow: hidden;
    }
    #landmarks-header {
      padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(249,168,37,0.15); background: rgba(249,168,37,0.05);
      flex-shrink: 0;
    }
    #landmarks-header span { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; color: #f9a825; }
    #landmarks-close {
      background: none; border: none; color: #555; font-size: 16px;
      cursor: pointer; line-height: 1; transition: color 0.15s;
    }
    #landmarks-close:hover { color: #f9a825; }
    #landmarks-body { overflow-y: auto; flex: 1; padding: 10px 14px; }
    .lm-row select, .lm-row input { outline: none; }
    .lm-row select:focus, .lm-row input:focus { border-color: rgba(249,168,37,0.4) !important; }
    .lm-del:hover { color: #ff4444 !important; }

    /* ── Settings modal ── */
    #settings-modal {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      align-items: flex-start; justify-content: flex-start;
      padding: 60px 0 0 12px;
    }
    #settings-panel {
      width: 340px; max-height: calc(100vh - 80px);
      background: rgba(5,7,13,0.97); border: 1px solid rgba(249,168,37,0.3);
      border-radius: 6px; display: flex; flex-direction: column; overflow: hidden;
    }
    #settings-header {
      padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(249,168,37,0.15); background: rgba(249,168,37,0.05);
      flex-shrink: 0;
    }
    #settings-header span {
      font-size: 10px; font-weight: 700; letter-spacing: 0.18em; color: #f9a825;
    }
    #settings-close {
      background: none; border: none; color: #555; font-size: 16px;
      cursor: pointer; line-height: 1; transition: color 0.15s;
    }
    #settings-close:hover { color: #f9a825; }
    #settings-list { overflow-y: auto; flex: 1; padding: 8px 0; }
    .settings-group { margin-bottom: 4px; }
    .settings-group-title {
      padding: 6px 14px 4px; font-size: 8px; font-weight: 700;
      letter-spacing: 0.2em; color: #444; text-transform: uppercase;
    }
    .settings-row { padding: 8px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .settings-row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
    .settings-label { font-size: 11px; color: #ccc; font-weight: 700; }
    .settings-status { font-size: 9px; letter-spacing: 0.1em; }
    .settings-status.set   { color: #69f0ae; }
    .settings-status.unset { color: #555; }
    .settings-hint { font-size: 9px; color: #444; margin-bottom: 6px; line-height: 1.5; }
    .settings-input-row { display: flex; gap: 6px; }
    .settings-input {
      flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
      color: #ccc; padding: 5px 8px; font-family: 'Courier New', monospace;
      font-size: 11px; border-radius: 2px; outline: none;
    }
    .settings-input:focus { border-color: rgba(249,168,37,0.5); }
    .settings-input::placeholder { color: #555; }
    /* Override browser autofill yellow/white background */
    .settings-input:-webkit-autofill,
    .settings-input:-webkit-autofill:hover,
    .settings-input:-webkit-autofill:focus {
      -webkit-text-fill-color: #ccc;
      -webkit-box-shadow: 0 0 0px 1000px #05070d inset;
      transition: background-color 5000s ease-in-out 0s;
    }
    .settings-save-btn {
      background: rgba(249,168,37,0.12); border: 1px solid rgba(249,168,37,0.35);
      color: #f9a825; padding: 5px 10px; font-family: 'Courier New', monospace;
      font-size: 9px; letter-spacing: 0.1em; cursor: pointer; border-radius: 2px;
      transition: background 0.15s; white-space: nowrap;
    }
    .settings-save-btn:hover { background: rgba(249,168,37,0.25); }
    .settings-save-btn:disabled { opacity: 0.5; cursor: default; }
    #layer-panel { padding: 4px 0; }
    .layer-row {
      display: flex; align-items: center; gap: 7px; padding: 5px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer;
    }
    .layer-row:hover { background: rgba(255,255,255,0.03); }
    .layer-row-active { background: rgba(255,255,255,0.06) !important; }
    .layer-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: opacity 0.2s; }
    .layer-label { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #bbb; flex: 1; }
    .layer-toggle { accent-color: #f9a825; cursor: pointer; }
    .layer-count { font-size: 10px; color: #444; min-width: 26px; text-align: right; }
    .panel-section { border-top: 1px solid rgba(255,255,255,0.06); }
    #map-provider-panel { padding: 5px 8px; display: flex; flex-direction: column; gap: 3px; }
    .provider-btn {
      font-family: 'Courier New', monospace; font-size: 10px;
      padding: 3px 8px; border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: #555; cursor: pointer;
      border-radius: 2px; transition: all 0.15s; width: 100%; text-align: left;
    }
    .provider-btn:hover { color: #ccc; }
    #landmark-list { display: flex; flex-direction: column; }
    .landmark-btn {
      background: none; border: none; color: #555; font-size: 10px;
      font-family: 'Courier New', monospace; padding: 3px 12px;
      text-align: left; cursor: pointer; transition: color 0.15s;
    }
    .landmark-btn:hover { color: #f9a825; }

    /* ── Right panel ── */
    #right-panel {
      position: absolute; top: 52px; right: 12px; z-index: 10; width: 230px;
      background: rgba(5,7,13,0.88); border: 1px solid rgba(0,188,212,0.2);
      border-radius: 4px; backdrop-filter: blur(8px);
      max-height: calc(100vh - 120px); display: flex; flex-direction: column;
    }
    #right-panel-tabs {
      display: flex; flex-wrap: wrap; gap: 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(0,0,0,0.3); flex-shrink: 0;
    }
    .tab-btn {
      flex: 1 0 auto; padding: 5px 4px; font-family: 'Courier New', monospace;
      font-size: 9px; letter-spacing: 0.1em; font-weight: 700;
      background: transparent; border: none; border-bottom: 2px solid transparent;
      color: #aaa; cursor: pointer; transition: color 0.15s;
      min-width: 36px;
    }
    .tab-btn:hover { color: #fff; }
    .tab-btn.tab-active { background: rgba(255,255,255,0.04); }
    #right-panel-header { display: none; }
    #data-list { overflow-y: auto; flex: 1; }
    .panel-empty { padding: 12px; color: #444; font-size: 11px; }

    /* Generic list cards (flights, ships, seismic, etc.) */
    .list-card {
      padding: 7px 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer; transition: background 0.12s;
    }
    .list-card:hover { background: rgba(255,255,255,0.04); }
    .list-card-title { font-size: 13px; font-weight: 700; color: #f9a825; letter-spacing: 0.04em; }
    .list-card-detail { font-size: 10px; color: #555; margin-top: 1px; }
    .list-card-detail span { color: #999; }

    /* ── Entity detail card ── */
    #entity-detail {
      position: absolute; bottom: 80px; left: 220px; z-index: 10; width: 210px;
      display: none; background: rgba(5,7,13,0.92);
      border: 1px solid rgba(249,168,37,0.35); border-radius: 4px;
      backdrop-filter: blur(8px);
    }
    .detail-header { display: flex; align-items: center; padding: 7px 12px 3px; }
    .detail-type { font-size: 9px; letter-spacing: 0.15em; color: #f9a825; flex: 1; }
    .detail-close { background: none; border: none; color: #444; cursor: pointer; font-size: 12px; }
    .detail-close:hover { color: #fff; }
    .detail-name { padding: 2px 12px 7px; font-size: 14px; font-weight: 700; color: #fff; }
    .detail-rows { padding: 0 12px 7px; }
    .detail-row { display: flex; justify-content: space-between; padding: 2px 0; border-top: 1px solid rgba(255,255,255,0.05); }
    .detail-key { font-size: 10px; color: #444; }
    .detail-val { font-size: 10px; color: #ccc; }
    .detail-track-btn {
      width: 100%; background: none; border: none; border-top: 1px solid rgba(249,168,37,0.15);
      color: #f9a825; font-size: 10px; letter-spacing: 0.12em; padding: 6px;
      cursor: pointer; font-family: 'Courier New', monospace;
    }
    .detail-track-btn:hover { background: rgba(249,168,37,0.08); }

    /* ── View controls ── */
    #view-controls {
      position: absolute; bottom: 80px; right: 238px; z-index: 10;
      display: flex; flex-direction: column; gap: 4px;
    }
    .vc-row { display: flex; gap: 4px; }
    .vc-btn {
      width: 30px; height: 30px; background: rgba(5,7,13,0.88);
      border: 1px solid rgba(255,255,255,0.12); color: #888; cursor: pointer;
      font-size: 13px; border-radius: 3px; display: flex; align-items: center;
      justify-content: center; transition: all 0.12s; font-family: sans-serif;
    }
    .vc-btn:hover { color: #f9a825; border-color: rgba(249,168,37,0.4); background: rgba(249,168,37,0.08); }
    .vc-btn.wide { width: 64px; font-size: 10px; letter-spacing: 0.08em; }
    #btn-reset-view { width: 64px; font-size: 10px; color: #f9a825; border-color: rgba(249,168,37,0.3); }
    #btn-my-location { width: 64px; font-size: 10px; }
    /* Compass */
    #compass-wrap {
      width: 30px; height: 30px; background: rgba(5,7,13,0.88);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative; overflow: hidden;
    }
    #compass-needle {
      font-size: 16px; transition: transform 0.1s linear;
      user-select: none; pointer-events: none;
    }

    /* ── Playback bar ── */
    #playback {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      z-index: 10; background: rgba(5,7,13,0.90);
      border: 1px solid rgba(249,168,37,0.22); border-radius: 50px;
      padding: 7px 18px; display: flex; align-items: center; gap: 12px;
      backdrop-filter: blur(8px);
    }
    .pb-btn {
      background: rgba(249,168,37,0.12); color: #f9a825;
      border: 1px solid rgba(249,168,37,0.35); border-radius: 50%;
      width: 26px; height: 26px; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .pb-btn:hover { background: rgba(249,168,37,0.3); }
    #snapshot-time { color: #666; font-size: 11px; min-width: 165px; text-align: center; }
    #snapshot-counter { color: #f9a825; font-size: 11px; min-width: 46px; text-align: center; }
    #btn-live {
      background: none; border: 1px solid rgba(249,168,37,0.35); color: #f9a825;
      border-radius: 3px; padding: 3px 8px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; cursor: pointer; font-family: 'Courier New', monospace;
    }
    #btn-live:hover { background: rgba(249,168,37,0.12); }

    /* ── Toast / landmark name ── */
    #toast {
      position: absolute; top: 54px; left: 50%; transform: translateX(-50%);
      z-index: 20; background: rgba(249,168,37,0.92); color: #000;
      padding: 5px 16px; border-radius: 3px; font-size: 12px; font-weight: 700;
      letter-spacing: 0.06em; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #landmark-name {
      position: absolute; top: 54px; left: 50%; transform: translateX(-50%);
      z-index: 19; background: rgba(5,7,13,0.85); color: #f9a825;
      border: 1px solid rgba(249,168,37,0.3); padding: 4px 14px; border-radius: 3px;
      font-size: 11px; letter-spacing: 0.08em; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }

    /* ── Save location prompt ── */
    #save-location-prompt {
      position: absolute; top: 54px; left: 50%; transform: translateX(-50%);
      z-index: 25; background: rgba(5,7,13,0.95);
      border: 1px solid rgba(249,168,37,0.4); border-radius: 4px;
      padding: 12px 16px; display: none; gap: 10px; align-items: center;
      backdrop-filter: blur(8px); white-space: nowrap;
    }
    #save-location-prompt span { font-size: 11px; color: #ccc; }
    .save-btn {
      background: rgba(249,168,37,0.15); border: 1px solid rgba(249,168,37,0.4);
      color: #f9a825; padding: 4px 10px; font-size: 10px; font-family: 'Courier New', monospace;
      cursor: pointer; border-radius: 2px; letter-spacing: 0.06em;
    }
    .save-btn:hover { background: rgba(249,168,37,0.28); }
    .skip-btn { background: none; border: none; color: #444; font-size: 10px; cursor: pointer; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Identify popup ── */
    #identify-popup {
      display: none; position: absolute; bottom: 72px; left: 50%; transform: translateX(-50%);
      z-index: 20; width: 360px; max-height: 340px;
      background: rgba(5,7,13,0.96); border: 1px solid rgba(0,188,212,0.35);
      border-radius: 4px; backdrop-filter: blur(10px);
      flex-direction: column; overflow: hidden;
    }
    #identify-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 12px; border-bottom: 1px solid rgba(0,188,212,0.15);
      background: rgba(0,188,212,0.06); flex-shrink: 0;
    }
    #identify-header span { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; color: #00bcd4; }
    #identify-coord { font-size: 9px; color: #555; letter-spacing: 0.06em; }
    #identify-close {
      background: none; border: none; color: #555; font-size: 14px;
      cursor: pointer; line-height: 1; transition: color 0.15s;
    }
    #identify-close:hover { color: #00bcd4; }
    #identify-body { overflow-y: auto; flex: 1; }
    .id-loading, .id-empty { padding: 12px; font-size: 11px; color: #555; }
    .id-result { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .id-layer-name { font-size: 9px; letter-spacing: 0.1em; color: #00bcd4; margin-bottom: 4px; text-transform: uppercase; }
    .id-attr { display: flex; gap: 6px; font-size: 10px; line-height: 1.6; }
    .id-key { color: #555; min-width: 100px; flex-shrink: 0; }
    .id-val { color: #bbb; }
  </style>
</head>
<body>

<div id="cesiumContainer"></div>

<!-- Header -->
<div id="header">
  <h1>STRAY<span>A</span>NOW</h1>
  <span class="tagline">Australian Spatial Intelligence</span>
  <div class="mode-buttons">
    <button class="mode-btn" data-mode="normal">1 NORMAL</button>
    <button class="mode-btn" data-mode="nvg">2 NVG</button>
    <button class="mode-btn" data-mode="flir">3 FLIR</button>
    <button class="mode-btn" data-mode="crt">4 CRT</button>
  </div>
  <span id="mode-indicator">NORMAL</span>
</div>

<!-- Left panel -->
<div id="left-panel">
  <div class="panel-title">
    Data Layers
    <button id="btn-settings" title="API Credentials &amp; Settings">⚙</button>
  </div>
  <div id="layer-panel"></div>

  <div class="panel-section">
    <div class="panel-title">Map Layer</div>
    <div id="map-provider-panel">
      <button class="provider-btn" data-provider="osm">Street (OSM)</button>
      <button class="provider-btn" data-provider="hybrid">Hybrid (Sat+Labels)</button>
      <button class="provider-btn" data-provider="satellite">Satellite</button>
      <button class="provider-btn" data-provider="dark">Dark</button>
      <button class="provider-btn" data-provider="google3d">Google 3D Tiles</button>
    </div>
  </div>

  <div class="panel-section">
    <div class="panel-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>Landmarks</span>
      <button id="btn-edit-landmarks" title="Edit landmarks" style="background:none;border:none;color:#444;
        cursor:pointer;font-size:13px;padding:0 4px;line-height:1;transition:color 0.15s"
        onmouseover="this.style.color='#f9a825'" onmouseout="this.style.color='#444'">✎</button>
    </div>
    <div id="landmark-list"></div>
  </div>
</div>

<!-- Right panel (generic data list) -->
<div id="right-panel">
  <div id="right-panel-tabs"></div>
  <div id="right-panel-header">STRAYANOW</div>
  <div id="data-list"><p class="panel-empty">Select a tab above.</p></div>
</div>

<!-- Entity detail -->
<div id="entity-detail"></div>

<!-- Toasts -->
<div id="toast"></div>
<div id="landmark-name"></div>

<!-- Save location prompt -->
<div id="save-location-prompt">
  <span>Save as start location?</span>
  <button class="save-btn" id="btn-save-location">SAVE</button>
  <button class="skip-btn" id="btn-skip-location">skip</button>
</div>

<!-- View controls -->
<div id="view-controls">
  <div class="vc-row">
    <button class="vc-btn wide" id="btn-reset-view">⌂ RESET</button>
    <button class="vc-btn wide" id="btn-my-location">⊙ LOCATE</button>
  </div>
  <div class="vc-row" style="justify-content:center">
    <button class="vc-btn" id="btn-pan-n">↑</button>
  </div>
  <div class="vc-row">
    <button class="vc-btn" id="btn-pan-w">←</button>
    <button class="vc-btn" id="btn-tilt-up">⌅</button>
    <button class="vc-btn" id="btn-pan-e">→</button>
  </div>
  <div class="vc-row">
    <button class="vc-btn" id="btn-rotate-l">↺</button>
    <button class="vc-btn" id="btn-pan-s">↓</button>
    <button class="vc-btn" id="btn-rotate-r">↻</button>
  </div>
  <div class="vc-row">
    <button class="vc-btn" id="btn-zoom-in">＋</button>
    <div class="vc-btn" id="compass-wrap" title="Click to reset north" id="btn-north-up">
      <span id="compass-needle">↑</span>
    </div>
    <button class="vc-btn" id="btn-zoom-out">－</button>
  </div>
</div>

<!-- Playback bar -->
<div id="playback">
  <button class="pb-btn" id="btn-prev">‹</button>
  <div id="snapshot-time">—</div>
  <button class="pb-btn" id="btn-play">▶</button>
  <button class="pb-btn" id="btn-next">›</button>
  <div id="snapshot-counter">0 / 0</div>
  <button id="btn-live">STRAYANOW</button>
</div>

<!-- Identify popup (LIST maps click-to-identify) -->
<div id="identify-popup">
  <div id="identify-header">
    <span>⊙ IDENTIFY RESULTS</span>
    <span id="identify-coord"></span>
    <button id="identify-close">✕</button>
  </div>
  <div id="identify-body"></div>
</div>

<!-- Settings modal -->
